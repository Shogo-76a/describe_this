        the target image. [CRUCIAL: Output `null` ONLY IF the user''s text is 100%
        grammatically flawless AND already perfectly covers all necessary details
        of the Model Image. Do NOT include the bonus_phrase here.]\",\n      \n      \"spelling_errors\":
        [\n        // Max 5 unique errors. Ignore capitalization/punctuation. Return
        [] if none. No duplicates.\n        {\n          \"error\": \"Misspelled word\",\n          \"correction\":
        \"Correct spelling inferred strictly from the Model Image''s context.\"\n        }\n      ],\n      \n      \"next_step_advice\":
        \"One concise, forward-looking comment (1-3 sentences) in Japanese that synthesizes
        the most important takeaway from the rest of the feedback (both language and
        image communication). Tell the user exactly what to focus on next time to
        improve. (e.g., ''次は〇〇のような表現を使って、場所の状況から説明してみましょう'').\",\n      \n      \"bonus_phrase\":
        {\n        \"phrase\": \"One useful idiom/collocation/phrasal verb in English
        related to the topic. [CRUCIAL: This exact phrase MUST NOT be present in either
        the ''original_text'' or the ''rewritten_text''.]\",\n        \"meaning\":
