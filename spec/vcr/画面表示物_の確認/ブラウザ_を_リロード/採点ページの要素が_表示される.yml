        It must serve as a direct, upgraded replacement for a part of the user''s
        original description.]\",\n        \"example_translation\": \"The exact translation
        of the example sentence written in Japanese.\"\n      }\n    }\n"},{"role":"user","content":[{"type":"text","text":"Please
