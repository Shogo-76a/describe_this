default: &default
  dispatchers:
    - polling_interval: <%= ENV.fetch("DISPATCHERS_POLLING_INTERVAL", 1) %>
      batch_size: 500
  workers:
    - queues: "*"
      threads: 3
      processes: <%= ENV.fetch("JOB_CONCURRENCY", 1) %>
      polling_interval: <%= ENV.fetch("WORKERS_POLLING_INTERVAL", 0.1) %>

development:
  <<: *default

test:
  <<: *default

production:
  <<: *default
