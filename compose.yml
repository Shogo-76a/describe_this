services:
  # データベースサービス (PostgreSQL)
  db:
    image: postgres:18
    platform: linux/amd64
    environment:
      TZ: Asia/Tokyo
      POSTGRES_PASSWORD: password
    volumes:
      # DBのデータをPC側に永続化し、コンテナを消してもデータが消えないようにする
      - postgres_data:/var/lib/postgresql
    ports:
      # PCの5432番ポートをコンテナの5432番ポートに接続
      - "5432:5432"

  # 追加するSeleniumコンテナ
  chrome:
    image: selenium/standalone-chrome:latest  # Intel / AMD チップ用
    # image: seleniarm/standalone-chromium:latest # Apple Silicon (M1/M2/M3 Mac) 用
    shm_size: 2gb
    ports:
      - "4444:4444"   # Seleniumの接続ポート
      - "7900:7900"   # ブラウザ画面確認用（http://localhost:7900 パスワード: secret）

  # Railsアプリケーションサービス
  web:
    build:
      context: .
      dockerfile: Dockerfile.dev #どのDockerfileをcompose build に使うか指定する 
    # コンテナ内でPryなどのデバッガを対話的に使うために必要
    tty: true
    stdin_open: true
    volumes:
      # PCの現在いるフォルダをコンテナの/appに同期させる (コードの変更が即時反映される)
      - .:/app
      # GemをPC側にキャッシュし、ビルドを高速化する
      - bundle_data:/usr/local/bundle:cached
    ports:
      # PCの3000番ポートをコンテナの3000番ポートに接続
      - "3000:3000"
    # dbサービスが起動してからwebサービスを起動する
    depends_on:
      - db
      - chrome

# volumesで定義した名前付きボリュームをDockerに作成させる
volumes:
  postgres_data:
  bundle_data: